<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoLog — Réinitialisation du mot de passe</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: white; border-radius: 24px; padding: 32px 28px; width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(30,58,138,0.12); }
  .logo { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
  .logo span { color: #1d4ed8; }
  .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 28px; }
  label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-wrap { position: relative; margin-bottom: 16px; }
  input[type=password], input[type=text] { width: 100%; padding: 12px 44px 12px 14px; border: 1.5px solid #e5e7eb; border-radius: 12px; font-size: 15px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #1d4ed8; }
  .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; }
  button.submit { width: 100%; padding: 14px; background: #1d4ed8; color: white; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
  button.submit:hover { opacity: 0.9; }
  button.submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { background: #fee2e2; color: #dc2626; border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
  .success { text-align: center; display: none; }
  .success .icon { font-size: 56px; margin-bottom: 16px; }
  .success h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: #111827; }
  .success p { font-size: 14px; color: #6b7280; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Auto<span>Log</span></div>
  <div class="subtitle">Réinitialisation du mot de passe</div>

  <div id="form-section">
    <div id="error-box" class="error"></div>
    <label>Nouveau mot de passe</label>
    <div class="input-wrap">
      <input type="password" id="pwd" placeholder="Min. 8 caractères">
      <button class="eye-btn" onclick="togglePwd('pwd','eye1')" id="eye1" type="button">👁</button>
    </div>
    <label>Confirmer le mot de passe</label>
    <div class="input-wrap">
      <input type="password" id="pwd-confirm" placeholder="Min. 8 caractères">
      <button class="eye-btn" onclick="togglePwd('pwd-confirm','eye2')" id="eye2" type="button">👁</button>
    </div>
    <button class="submit" id="submit-btn" onclick="doReset()">Enregistrer mon mot de passe →</button>
  </div>

  <div class="success" id="success-section">
    <div class="icon">✅</div>
    <h2>Mot de passe mis à jour !</h2>
    <p>Vous pouvez maintenant vous connecter à AutoLog avec votre nouveau mot de passe.</p>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ruxncwzhduozytqoijhh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1eG5jd3poZHVvenl0cW9pamhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTQwODksImV4cCI6MjA4OTc3MDA4OX0.cDlvZ7xPUleC1_1qXJKZFoRTcGRR-RP8c0YXFqR2Uag';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function togglePwd(id, eyeId) {
  const inp = document.getElementById(id);
  const eye = document.getElementById(eyeId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  eye.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.style.display = 'block';
}

async function doReset() {
  const pwd = document.getElementById('pwd').value;
  const confirm = document.getElementById('pwd-confirm').value;
  document.getElementById('error-box').style.display = 'none';

  if (pwd.length < 8) { showError('Le mot de passe doit contenir au moins 8 caractères.'); return; }
  if (pwd !== confirm) { showError('Les mots de passe ne correspondent pas.'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Enregistrement...';

  try {
    const { error } = await sb.auth.updateUser({ password: pwd });
    if (error) throw error;
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('success-section').style.display = 'block';
  } catch(e) {
    showError(e.message || 'Une erreur est survenue. Réessayez.');
    btn.disabled = false;
    btn.textContent = 'Enregistrer mon mot de passe →';
  }
}
</script>
</body>
</html>
